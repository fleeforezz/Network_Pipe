[Interface]
Address    = 10.8.0.2/24
PrivateKey = <CLIENT_PRIVATE_KEY>
DNS        = 10.0.1.41        # Pi-hole — local DNS resolution over VPN

[Peer]
PublicKey  = <PFSENSE_PUBLIC_KEY>   # copied from tunnel step 2
Endpoint   = <YOUR_WAN_IP>:51820
AllowedIPs = 10.0.1.0/24           # split tunnel — LAN traffic only # use 0.0.0.0/0 for full tunnel (all traffic via VPN)
PersistentKeepalive = 25